# =============================================================================
# Mosquitto ACL – Controlled Topic Access (Group 24)
# =============================================================================
# This file enforces topic-level access control as required by the
# cybersecurity section of the project guidelines.

# -------------------------------------------------------
# User: group24 (Edge Device / Simulator)
# - Can publish sensor data (DDATA, DBIRTH, DDEATH)
# - Can subscribe to commands (DCMD)
# - Can publish/subscribe status topics
# -------------------------------------------------------
user group24
topic readwrite spBv1.0/group24/#
topic readwrite status/group24/#
topic read cmd/group24/#

# -------------------------------------------------------
# User: nodered (Node-RED Flow Logic)
# - Can subscribe to all sensor data
# - Can publish commands to devices
# - Can read/write status topics
# -------------------------------------------------------
user nodered
topic readwrite spBv1.0/group24/#
topic readwrite status/group24/#
topic readwrite cmd/group24/#
topic readwrite modbus/group24/#

# -------------------------------------------------------
# Pattern-based rules (fallback)
# Deny everything not explicitly granted
# -------------------------------------------------------
