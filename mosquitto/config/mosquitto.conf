# =============================================================================
# Mosquitto MQTT Broker Configuration – Group 24
# =============================================================================

# Listener on port 1883, accept connections from any interface
listener 1883 0.0.0.0

# Disable anonymous access (mandatory security requirement)
allow_anonymous false

# Password file for authentication (hashed passwords)
password_file /mosquitto/config/passwd

# Access Control List for topic-level authorization
acl_file /mosquitto/config/acl.conf

# Persistence settings
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
connection_messages true
